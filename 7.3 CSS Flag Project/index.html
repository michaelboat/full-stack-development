<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>CSS Flag Project</title>
  <style>
    /* Write your CSS Code here */
    p {
      margin: 0;
      font-size: 5rem;
    }
    .flag {
      position: relative;
      height: 600px;
      width: 900px;
      background-color: red;
      color: white;
      z-index: -1;
      border: solid black;
      border-width: 5px;
    }
    
    .flag > p {
      position: absolute;
      height: 150px;
      width: 100%;
      top: 0;
      text-align: center;
      margin: 0;
    }
    
    .flag div {
      position: relative;
      top: 150px;
      background-color: blue;
      height: 300px;
      width: 100%;
      align-self: center;
      z-index: 0;
    }

    .flag > div > div {
      background-color: white;
      color: black;
      height: 200px;
      width: 200px;
      border-radius: 50%;
      position: absolute;
      left: 350px;
      top: 50px;
    }
    .flag > div > div > p {
      text-align: center;
    }
    
  </style>
</head>

<!-- 
  IMPORTANT! Do not change any HTML
Don't add any classes/ids/elements 
Use what you know about combining selectors 
and CSS specificity instead.
Hint 1: The flag is 900px by 600px and the circle is 200px by 200px.
Hint 2: You can use CSS inspection to get the colors from
https://appbrewery.github.io/flag-of-laos/
-->

<body>
  <div class="flag">
    <p>The Flag</p>
    <div>
      <div>
        <p>of Laos</p>
      </div>
    </div>
  </div>
</body>

</html>
